{% assign active_section = include.active | default: page.section_key %}

<nav class="section-tabs" aria-label="포스트 섹션">
  {% for section in site.data.sections %}
    {% assign section_posts = site.posts | where: "section", section.key %}
    <a class="section-tabs__link{% if active_section == section.key %} is-active{% endif %}" href="{{ section.url | relative_url }}">
      <span>{{ section.title }}</span>
      <span class="section-tabs__count">{{ section_posts | size }}</span>
    </a>
  {% endfor %}
</nav>
