<!-- Dark/Light theme toggle: apply saved preference before paint to avoid flash -->
<script>
(function() {
  var saved = localStorage.getItem('wd-theme');
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
  }
})();
</script>
