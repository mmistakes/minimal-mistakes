{% assign hero_avatar = include.avatar | default: site.author.avatar %}

<section class="ui-hero ui-section">
  {% if hero_avatar %}
    <img
      class="ui-hero__avatar"
      src="{{ hero_avatar | relative_url }}"
      alt="{{ site.author.name | default: "Profile photo" }}"
      loading="lazy"
    />
  {% endif %}

  <div class="ui-hero__content">
    <p class="ui-kicker">{{ include.kicker }}</p>
    <h1>{{ include.title }}</h1>
    <p>{{ include.subtitle }}</p>
    {% if include.cta_text and include.cta_link %}
      <a class="ui-button" href="{{ include.cta_link }}">{{ include.cta_text }}</a>
    {% endif %}
  </div>
</section>
