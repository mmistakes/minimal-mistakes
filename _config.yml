# Theme Settings
minimal_mistakes_skin: "default" # "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"

# Site Settings
locale                   : "en-US"
title                    : "Gautham Kumaran"
title_separator          : "-"
subtitle                 : "Applied AI Engineer · Senior Data Scientist"
name                     : "Gautham Kumaran"
description              : "Applied AI Engineer and Senior Data Scientist with 10+ years of experience building ML systems with measurable business impact."
url                      : ""
baseurl                  : ""
repository               : "gautham20/gautham-site"
words_per_minute         : 200
atom_feed:
  hide                   : true
search                   : false

# Social Sharing
social:
  type                   : Person
  name                   : Gautham Kumaran
  links:
    - "https://linkedin.com/in/gautham20"
    - "https://github.com/gautham20"

# Site Author
author:
  name             : "Gautham Kumaran"
  bio              : "Applied AI Engineer & Senior Data Scientist. Building AI agents and the evaluation systems behind them."
  location         : "Dubai, UAE"
  email            : "gautham.kumaran11@gmail.com"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-square-envelope"
